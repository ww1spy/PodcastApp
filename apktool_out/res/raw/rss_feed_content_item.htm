<html><head><meta content="text/html; charset=UTF-8" http-equiv="content-type">
<meta name="viewport" content="width=device-width" />
<meta name="viewport" content="user-scalable=no"/>
<meta name="viewport" content="initial-scale=1.0" />
<meta name="viewport" content="maximum-scale=1.0" />
<meta name="viewport" content="target-densitydpi=medium-dpi" />

    <style type="text/css">
        @font-face{ font-family: 'RobotoLight'; font-weight: normal; font-style: normal; src:url('file:///android_asset/fonts/Roboto-Light.ttf') format('truetype');}
        * { -webkit-user-select: none; -webkit-tap-highlight-color: rgba(0, 0, 0, 0); }
        img {  max-width: 100%; height: auto; }
        blockquote {  margin-left: 10px;  margin-right: 10px;  padding-left: 10px;  border-left: thin solid #FF6339;}
        video  {  max-width: 100%; }
        iframe { max-width: 100%; }
        embed  {  max-width: 100%; }
        body {  font-size: #DOCUMENT_FONT_SIZE#; line-height: 150%; font-family: 'RobotoLight'; }
        .title {  font-size: 120%; font-weight: bold; padding-bottom: 4pt; line-height: 120%; }
        .dateLine {  margin-top:1pt; right; margin-bottom: 35pt; font-variant: small-caps; color:#999;}
        .pubDate {  font-size: smaller; text-transform: uppercase; font-weight: bolder;}
        .origFeed {  font-style: italic;}
        .titleLink   {  text-decoration:none;  color:inherit; }
        a:link {color: #FF6339; text-decoration:none;}
        #DOCUMENT_THEME#
    </style>
 
</head><body class="theme" topmargin="70sp" leftmargin="25sp" rightmargin="25sp" >
<div class="title"><a class="titleLink" href="@@@@@#ITEM_LINK#">#ITEM_TITLE#&nbsp;<img src="file:///android_asset/external_link.png"/></a></div>
<div class="dateLine"><span id="xyz" class="pubDate">#ITEM_PUB_DATE#</span> - <span class="origFeed">#ITEM_ORIG_FEED#</span></div>
#FEEDITEM_DESCRIPTION#
<br/><br/>
<div  style="margin-bottom: 20sp;"></div>
<script type="text/javascript" src="file:///android_asset/normalize_videos.js" ></script>
</body></html>
